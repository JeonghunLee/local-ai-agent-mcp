name: Test Request Local Runner

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: read
  issues: write

jobs:
  run-local-test-request:
    if: contains(github.event.issue.labels.*.name, 'test-request')
    runs-on: [self-hosted, local-dev]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner context
        shell: powershell
        run: |
          Write-Host "Runner Name: $env:RUNNER_NAME"
          Write-Host "Runner OS: $env:RUNNER_OS"
          Write-Host "Repository: $env:GITHUB_REPOSITORY"

      - name: Run test request through local MCP
        shell: powershell
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python -m mcp.local_action_runner.run_test_request `
            --issue-number "${{ github.event.issue.number }}" `
            --issue-title "${{ github.event.issue.title }}" `
            --issue-body "$env:ISSUE_BODY" `
            --expected-runner "local-dev"

      - name: Upload MCP logs and results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-request-${{ github.event.issue.number }}
          path: |
            results/log_mcp_server_local/*.log
            results/*.json

      - name: Comment result on issue
        if: always()
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RESULT_PATH: results/issue-test-request-${{ github.event.issue.number }}.json
        with:
          script: |
            const fs = require("fs");
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const resultPath = process.env.RESULT_PATH;
            const issueBody = context.payload.issue?.body || "";

            function extractField(label) {
              const pattern = new RegExp(`^- ${label}:\\s*(.*)$`, "m");
              const match = issueBody.match(pattern);
              return match ? match[1].trim() : "n/a";
            }

            let body;

            if (!fs.existsSync(resultPath)) {
              const requestedMode = extractField("MCP Server Mode");
              const requestedRunner = extractField("Target Runner");
              const requestRef = extractField("Branch / Tag / Commit");
              body = [
                "## Test Request Result",
                "",
                "### 1. TEST Result",
                "- Status: error",
                "- Reason: result file was not created",
                "",
                "### 2. Request Ref",
                `- MCP Server Mode (requested): ${requestedMode}`,
                "- MCP Server (resolved): n/a",
                `- Target Runner (requested): ${requestedRunner}`,
                `- Target Runner (workflow expected): ${process.env.RUNNER_NAME || "local-dev"}`,
                `- Request Ref: ${requestRef}`,
              ].join("\n");
            } else {
              const payload = JSON.parse(fs.readFileSync(resultPath, "utf8"));
              const parsed = payload.parsed_fields || {};
              const lines = [
                "## Test Request Result",
                "",
                "### 1. TEST Result",
                `- Status: ${payload.status || "unknown"}`,
              ];

              if (payload.reason) {
                lines.push(`- Reason: ${payload.reason}`);
              }

              if (payload.error) {
                lines.push(`- Error: ${payload.error}`);
              }

              lines.push("");
              lines.push("### 2. Request Ref");
              lines.push(`- MCP Server Mode (requested): ${parsed.mcp_server_mode || "n/a"}`);
              lines.push(`- MCP Server (resolved): ${payload.resolved_server_name || "n/a"}`);
              lines.push(`- Target Runner (requested): ${parsed.target_runner || "n/a"}`);
              lines.push(`- Target Runner (workflow expected): ${payload.expected_runner || "n/a"}`);
              lines.push(`- Request Ref: ${parsed.request_ref || "n/a"}`);

              lines.push("");
              lines.push("### 3. Test Scope");

              if (payload.selected_tool) {
                lines.push(`- Selected Tool: ${payload.selected_tool}`);
              }
              lines.push(`- Test Type: ${parsed.test_type || "n/a"}`);
              lines.push(`- Target Device / Image: ${parsed.target_device_image || "n/a"}`);
              lines.push(`- Iterations: ${parsed.iterations || "n/a"}`);

              if (payload.log_paths) {
                lines.push("");
                lines.push("### 4. Logs");
                lines.push(`- Log Directory: ${payload.log_paths.log_dir || "n/a"}`);
                lines.push(`- Server Log: ${payload.log_paths.server_log || "n/a"}`);
                lines.push(`- Tool Log: ${payload.log_paths.tool_log || "n/a"}`);
              }

              if (payload.tool_result) {
                lines.push("");
                lines.push("### 5. Tool Result");
                lines.push("");
                lines.push("```json");
                lines.push(JSON.stringify(payload.tool_result, null, 2));
                lines.push("```");
              }

              body = lines.join("\n");
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
