name: Test Request Local Runner

on:
  issues:
    types:
      - opened
      - edited
      - reopened

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  issues: write

#
#  Every check for test request issues 
#   - template: .github/ISSUE_TEMPLATE/test_request_runner.yml
#  
#  only working self-hosted runner
#  - workflow files are executed inside the runner workspace checkout
#  - generated results/logs are created under actions-runner/_work/.../results
#
jobs:
  run-local-test-request:
    if: contains(github.event.issue.labels.*.name, 'test-request')
    runs-on: [self-hosted, local-dev]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
    #
    #   Windows Powershell runner 
    #
      - name: Show runner context
        shell: powershell
        run: |
          Write-Host "Runner Name: $env:RUNNER_NAME"
          Write-Host "Runner OS: $env:RUNNER_OS"
          Write-Host "Repository: $env:GITHUB_REPOSITORY"
          Write-Host "Actions Runner Version: $env:ACTIONS_RUNNER_VERSION"
          Write-Host "Runner Workspace: $env:GITHUB_WORKSPACE"
    # 
    #   mcp.scripts is working 
    #   -> call mcp.server_local_runner 
    #     -> toolset.py  
      - name: Run test request through local MCP
        shell: powershell
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python -m mcp.scripts.run_test_request `
            --issue-number "${{ github.event.issue.number }}" `
            --issue-title "${{ github.event.issue.title }}" `
            --issue-body "$env:ISSUE_BODY" `
            --expected-runner "local-dev"

      - name: Show generated result files
        if: always()
        shell: powershell
        run: |
          Write-Host "Current Working Directory: $(Get-Location)"
          Write-Host "GitHub Workspace: $env:GITHUB_WORKSPACE"
          if (Test-Path results) {
            Write-Host "Generated files under runner workspace results/"
            Get-ChildItem results -Recurse -File | Select-Object FullName, Length, LastWriteTime | Format-Table -AutoSize
          } else {
            Write-Host "results directory was not created"
          }

      - name: Upload MCP logs and results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-request-${{ github.event.issue.number }}
          if-no-files-found: error
          path: |
            results/logs/mcp/server_local/*.log
            results/*.json

      #
      #   Test Result (json/markdown) rendering
      #    result-path:
      #    output-path:
      #     actions-runner\_work\local-ai-agent-mcp\local-ai-agent-mcp\results         
      #
      - name: Render comment body
        if: always()
        shell: powershell
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python -m mcp.scripts.make_test_result `
            --issue-body "$env:ISSUE_BODY" `
            --result-path "results/Github-ISSUE-TR-${{ github.event.issue.number }}.json" `
            --output-path "results/test-request-comment-${{ github.event.issue.number }}.md" `
            --execution-platform "github-actions"
      #
      #   Test Result Commenting to Github Issue
      #   
      - name: Comment result on issue
        if: always()
        uses: actions/github-script@v8
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_BODY_PATH: results/test-request-comment-${{ github.event.issue.number }}.md
        with:
          script: |
            const fs = require("fs");
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const commentBodyPath = process.env.COMMENT_BODY_PATH;
            const body = fs.readFileSync(commentBodyPath, "utf8");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
