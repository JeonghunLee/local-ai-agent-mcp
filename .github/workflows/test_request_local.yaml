name: Test Request Local Runner

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

permissions:
  contents: read
  issues: write

jobs:
  run-local-test-request:
    if: contains(github.event.issue.labels.*.name, 'test-request')
    runs-on: [self-hosted, local-dev]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show runner context
        shell: pwsh
        run: |
          Write-Host "Runner Name: $env:RUNNER_NAME"
          Write-Host "Runner OS: $env:RUNNER_OS"
          Write-Host "Repository: $env:GITHUB_REPOSITORY"

      - name: Run test request through local MCP
        shell: pwsh
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python -m mcp.local_action_runner.run_test_request `
            --issue-number "${{ github.event.issue.number }}" `
            --issue-title "${{ github.event.issue.title }}" `
            --issue-body "$env:ISSUE_BODY" `
            --expected-runner "local-dev"

      - name: Upload MCP logs and results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-request-${{ github.event.issue.number }}
          path: |
            results/log_mcp_server_local/*.log
            results/*.json

      - name: Comment result on issue
        if: always()
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RESULT_PATH: results/issue-test-request-${{ github.event.issue.number }}.json
        with:
          script: |
            const fs = require("fs");
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const resultPath = process.env.RESULT_PATH;

            let body;

            if (!fs.existsSync(resultPath)) {
              body = [
                "## Test Request Result",
                "",
                "- Status: error",
                "- Reason: result file was not created",
              ].join("\n");
            } else {
              const payload = JSON.parse(fs.readFileSync(resultPath, "utf8"));
              const parsed = payload.parsed_fields || {};
              const lines = [
                "## Test Request Result",
                "",
                `- Status: ${payload.status || "unknown"}`,
                `- MCP Server Mode: ${parsed.mcp_server_mode || "runner"}`,
                `- Expected Runner: ${payload.expected_runner || "n/a"}`,
                `- Requested Runner: ${parsed.target_runner || "n/a"}`,
                `- Request Ref: ${parsed.request_ref || "n/a"}`,
                `- Test Type: ${parsed.test_type || "n/a"}`,
                `- Target Device / Image: ${parsed.target_device_image || "n/a"}`,
                `- Iterations: ${parsed.iterations || "n/a"}`,
              ];

              if (payload.selected_tool) {
                lines.push(`- Selected Tool: ${payload.selected_tool}`);
              }

              if (payload.reason) {
                lines.push(`- Reason: ${payload.reason}`);
              }

              if (payload.error) {
                lines.push(`- Error: ${payload.error}`);
              }

              if (payload.tool_result) {
                lines.push("");
                lines.push("### Tool Result");
                lines.push("");
                lines.push("```json");
                lines.push(JSON.stringify(payload.tool_result, null, 2));
                lines.push("```");
              }

              body = lines.join("\n");
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
